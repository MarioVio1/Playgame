<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="cardGrad-setup-24" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-setup-24" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-setup-24">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="380" height="540" rx="20" fill="white" filter="url(#shadow-setup-24)"/>
  <rect x="15" y="15" width="370" height="530" rx="18" fill="url(#cardGrad-setup-24)"/>
  
  <!-- Decorative Border -->
  <rect x="25" y="25" width="350" height="510" rx="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- Comic Panel Frame -->
  <rect x="40" y="60" width="320" height="320" rx="8" fill="white" filter="url(#shadow-setup-24)"/>
  <rect x="45" y="65" width="310" height="310" rx="6" fill="#1a1a2e"/>
  
  <!-- Scene Content -->
  <text x="200" y="180" font-family="Arial Black, sans-serif" font-size="80" text-anchor="middle" fill="white" filter="url(#glow-setup-24)">🚴</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.8)">Bike lesson</text>
  
  <!-- Corner Decorations -->
  <circle cx="60" cy="85" r="15" fill="#059669" opacity="0.8"/>
  <circle cx="340" cy="85" r="15" fill="#059669" opacity="0.8"/>
  <circle cx="60" cy="365" r="15" fill="#059669" opacity="0.8"/>
  <circle cx="340" cy="365" r="15" fill="#059669" opacity="0.8"/>
  
  <!-- Card Number Badge -->
  <circle cx="200" cy="420" r="35" fill="white" filter="url(#shadow-setup-24)"/>
  <circle cx="200" cy="420" r="30" fill="url(#cardGrad-setup-24)"/>
  <text x="200" y="428" font-family="Arial Black, sans-serif" font-size="24" text-anchor="middle" fill="white">24</text>
  
  <!-- Bottom Label -->
  <rect x="100" y="480" width="200" height="40" rx="20" fill="white" opacity="0.9"/>
  <text x="200" y="506" font-family="Arial Black, sans-serif" font-size="14" text-anchor="middle" fill="#10b981">JOKING HAZARD</text>
  
  <!-- Category Label -->
  <text x="200" y="540" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.6)" text-transform="uppercase">setup</text>
</svg>